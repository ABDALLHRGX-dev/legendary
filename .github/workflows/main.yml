name: Build Legendary Android ARM64

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  build:
    name: Build on ARM64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            curl \
            wget \
            zip \
            unzip \
            build-essential \
            clang \
            pkg-config \
            patchelf \
            libssl-dev \
            libffi-dev \
            python3-dev \
            rustc \
            cargo

      - name: Show environment
        run: |
          uname -a
          python --version
          pip --version
          rustc --version
          cargo --version

      - name: Upgrade Python build tools
        run: |
          python -m pip install --upgrade \
            pip \
            setuptools \
            wheel \
            build \
            maturin

      - name: Install project requirements
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install package locally
        run: |
          pip install . --no-deps

      - name: Build wheel
        run: |
          python -m build --wheel

      - name: Build source distribution
        run: |
          python -m build --sdist

      - name: Test Legendary CLI
        run: |
          legendary --help || python -m legendary.cli --help

      - name: Package standalone folder
        run: |
          mkdir -p release
          cp -r dist/* release/ || true

          if command -v legendary >/dev/null 2>&1; then
            mkdir -p release/bin
            cp "$(which legendary)" release/bin/legendary
          fi

          cat > release/run_legendary.sh << 'EOF'
          #!/usr/bin/env bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          if [ -x "$DIR/bin/legendary" ]; then
            "$DIR/bin/legendary" "$@"
          else
            python -m legendary.cli "$@"
          fi
          EOF

          chmod +x release/run_legendary.sh

      - name: Compress release
        run: |
          tar -czf legendary-android-arm64.tar.gz release

      - name: Upload wheel + sdist
        uses: actions/upload-artifact@v4
        with:
          name: legendary-dist
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload packaged release
        uses: actions/upload-artifact@v4
        with:
          name: legendary-android-arm64
          path: legendary-android-arm64.tar.gz
