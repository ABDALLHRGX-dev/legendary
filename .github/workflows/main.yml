name: Build Legendary Android ARM64 (Termux/Bionic)

on:
  workflow_dispatch:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: r26d
      API_LEVEL: 24

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget unzip git zip \
            clang lld cmake make \
            pkg-config patchelf \
            python3-dev

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Setup Android toolchain
        run: |
          TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64

          echo "CC=$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV

      - name: Upgrade build tools
        run: |
          python -m pip install --upgrade \
            pip setuptools wheel build cython pyinstaller

      - name: Install Python dependencies
        run: |
          pip install requests packaging pyinstaller
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          fi

      - name: Build Android-compatible binary
        working-directory: legendary
        run: |
          pyinstaller \
            --onefile \
            --name legendary \
            --distpath ../dist \
            cli.py

      - name: Verify binary type
        run: |
          file dist/legendary || true
          readelf -h dist/legendary | grep Machine || true

      - name: Package release
        run: |
          mkdir -p release
          cp dist/legendary release/legendary
          chmod +x release/legendary

          cat > release/run_legendary.sh << 'EOF'
          #!/data/data/com.termux/files/usr/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          "$DIR/legendary" "$@"
          EOF

          chmod +x release/run_legendary.sh

          tar -czf legendary-android-arm64-termux.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: legendary-android-arm64-termux
          path: |
            dist/legendary
            legendary-android-arm64-termux.tar.gz
