name: Legendary Termux Compatible Build

on:
  workflow_dispatch:
  push:
    branches: [ '*' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install requests packaging

      - name: Build zipapp for Termux
        run: |
          mkdir -p build dist
          cp -r legendary build/

          cat > build/__main__.py << 'EOF'
from legendary.cli import main
main()
EOF

          python -m zipapp build \
            -o dist/legendary \
            -p "/data/data/com.termux/files/usr/bin/python3" \
            --compress

      - name: Make package
        run: |
          chmod +x dist/legendary
          tar -czf legendary-termux.tar.gz -C dist legendary

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: legendary-termux
          path: |
            dist/legendary
            legendary-termux.tar.gz
