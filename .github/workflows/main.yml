name: Legendary Android ARM64 Binary

on:
  workflow_dispatch:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  pyinstaller-android-arm64:
    runs-on: ubuntu-24.04-arm

    env:
      UV_SYSTEM_PYTHON: 1
      PYTHONOPTIMIZE: 1

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            upx-ucl \
            patchelf

      - name: Install build dependencies
        run: |
          uv sync --extra pyinstaller_build --no-install-local

      - name: Optional WebView dependencies
        run: |
          uv sync --extra webview --no-install-local --inexact || true

      - name: Build ARM64 binary
        working-directory: legendary
        run: |
          uv run --module PyInstaller \
            --onefile \
            --name legendary \
            --strip \
            cli.py

      - name: Verify binary
        run: |
          file legendary/dist/legendary
          chmod +x legendary/dist/legendary
          ./legendary/dist/legendary --help || true

      - name: Compress binary
        run: |
          mkdir -p release
          cp legendary/dist/legendary release/legendary
          chmod +x release/legendary

          cat > release/run_legendary.sh << 'EOF'
          #!/usr/bin/env bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          "$DIR/legendary" "$@"
          EOF

          chmod +x release/run_legendary.sh

          tar -czf legendary-android-arm64-binary.tar.gz -C release .

      - uses: actions/upload-artifact@v7
        with:
          name: ubuntu-24.04-arm64-legendary-binary
          path: |
            legendary/dist/legendary
            legendary-android-arm64-binary.tar.gz
