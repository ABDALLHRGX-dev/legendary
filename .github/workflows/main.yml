name: I typed workflow code more than legendary code🥀🥀🥀 

on:
  workflow_dispatch:
  push:
    branches: [ '*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          mkdir -p build dist
          python -m pip install --upgrade pip
          pip install wheel setuptools requests packaging --target build/
          cp -r legendary build/

          cat > build/__main__.py << 'EOF'
          import sys, os, site
          
          # استدعاء مسارات النظام الخارجية داخل ترمكس
          p = "/data/data/com.termux/files/usr/lib/python3.12/site-packages"
          if os.path.exists(p): sys.path.insert(0, p)
          
          # محاولة استيراد التشفير من النظام
          try:
              import Cryptodome
          except ImportError:
              try:
                  import pycryptodomex as Cryptodome
                  sys.modules['Cryptodome'] = Cryptodome
              except ImportError:
                  pass

          import importlib.metadata
          orig = importlib.metadata.version
          def hooked(name):
              if name in ('legendary-gl', 'legendary'): return '0.20.34'
              try: return orig(name)
              except: return '0.0.0'
          importlib.metadata.version = hooked
          
          from legendary.cli import main
          if __name__ == '__main__':
              sys.exit(main())
          EOF

          find build -type d -name "tests" -exec rm -rf {} +
          find build -type d -name "__pycache__" -exec rm -rf {} +
          find build -type d -name "*.dist-info" -exec rm -rf {} +
          find build -type d -name "*.egg-info" -exec rm -rf {} +
          find build -name "*.pyc" -delete
          find build -name "*.so" -delete
          find build -name "*.exe" -delete

          python -m zipapp build -o dist/legendary -p "/data/data/com.termux/files/usr/bin/python3" --compress
          chmod +x dist/legendary

      - name: Package
        run: tar -czf legendary-termux.tar.gz -C dist legendary

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: legendary-termux
          path: |
            dist/legendary
            legendary-termux.tar.gz
